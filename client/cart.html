<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View items in your NovaCart shopping cart, adjust quantities, apply discount promo codes, and proceed to secure checkout.">
  <title>Shopping Cart | NovaCart</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Sticky Header -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span>Nova</span>Cart
      </a>
      <nav aria-label="Main Navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="dashboard.html?tab=wishlist" class="nav-btn" aria-label="View Wishlist" id="wishlist-nav-link">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
          <span class="badge" id="wishlist-badge" style="display: none;">0</span>
        </a>
        
        <a href="cart.html" class="nav-btn active" aria-label="View Shopping Cart">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
          <span class="badge" id="cart-badge" style="display: none;">0</span>
        </a>
        <div id="auth-nav">
          <a href="auth.html" class="auth-nav-link">Sign In</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Cart Page Layout -->
  <main class="container">
    <h1 style="font-size: 2.2rem; margin-bottom: 2.5rem; font-family: var(--font-heading);">Your Shopping Cart</h1>

    <div class="cart-layout" id="cart-layout-container">
      
      <!-- Cart items listing -->
      <section class="cart-items" id="cart-items-list">
        <!-- Dynamically rendered -->
        <div style="text-align: center; padding: 4rem; color: var(--text-dark);">Loading your shopping cart...</div>
      </section>

      <!-- Cart totals summary panel -->
      <aside class="cart-summary" aria-label="Order Checkout Summary">
        <h2 class="summary-title">Order Summary</h2>
        
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">$0.00</span>
        </div>
        
        <div class="summary-row">
          <span>Shipping Cost</span>
          <span id="summary-shipping">$0.00</span>
        </div>

        <div class="summary-row" id="summary-discount-row" style="display: none; color: var(--accent-emerald);">
          <span>Coupon Discount</span>
          <span id="summary-discount">-$0.00</span>
        </div>

        <div class="summary-row total">
          <span>Total Price</span>
          <span id="summary-total">$0.00</span>
        </div>

        <!-- Coupon code validation input container -->
        <div class="coupon-section">
          <label for="coupon-code" style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">Have a promo code?</label>
          <div class="coupon-input-group">
            <input type="text" id="coupon-code" class="form-input" placeholder="e.g. EMERALD20" style="width: 100%; border-radius: var(--radius-sm);" aria-label="Coupon promo code">
            <button id="apply-coupon-btn" class="btn btn-secondary" style="padding: 0.8rem 1.2rem; border-radius: var(--radius-sm);">Apply</button>
          </div>
          <div id="active-coupon-badge" style="display: none;">
            <!-- Active coupon badge loaded here -->
          </div>
        </div>

        <button id="checkout-btn" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">Proceed to Checkout</button>
        
        <div style="text-align: center; margin-top: 1rem;">
          <a href="shop.html" style="font-size: 0.85rem; color: var(--text-muted); text-decoration: underline;">Continue Shopping</a>
        </div>
      </aside>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-bottom">
      <div>&copy; 2026 NovaCart Inc. All Rights Reserved.</div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
