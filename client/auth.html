<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or register your NovaCart account to manage order delivery, view checkout tracking, and save profile preferences.">
  <title>Account Access | NovaCart</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Sticky Header -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span>Nova</span>Cart
      </a>
      <nav aria-label="Main Navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="dashboard.html?tab=wishlist" class="nav-btn" aria-label="View Wishlist" id="wishlist-nav-link">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
          <span class="badge" id="wishlist-badge" style="display: none;">0</span>
        </a>
        
        <a href="cart.html" class="nav-btn" aria-label="View Shopping Cart">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
          <span class="badge" id="cart-badge" style="display: none;">0</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Centered Auth Form Section -->
  <main class="container" style="padding-top: 6rem; padding-bottom: 6rem;">
    <div class="auth-container">
      
      <!-- Tab selectors -->
      <div class="auth-tabs" id="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</div>
        <div class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Register</div>
      </div>

      <!-- Login Form Panel -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="name@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
          <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
            <input type="checkbox" style="accent-color: var(--accent-emerald);"> Remember Me
          </label>
          <a href="#" class="emerald-link" onclick="showToast('Password reset link is disabled for this prototype.', true)">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <!-- Registration Form Panel -->
      <form id="register-form" style="display: none;">
        <div class="form-group">
          <label for="register-name">Full Name</label>
          <input type="text" id="register-name" class="form-input" placeholder="John Doe" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="register-email">Email Address</label>
          <input type="email" id="register-email" class="form-input" placeholder="name@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" class="form-input" placeholder="Minimum 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        <div style="margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
          <label style="display: flex; align-items: flex-start; gap: 0.4rem; cursor: pointer;">
            <input type="checkbox" required style="accent-color: var(--accent-emerald); margin-top: 0.2rem;"> 
            <span>I agree to the <a href="#" class="emerald-link">Terms of Service</a> & <a href="#" class="emerald-link">Privacy Policy</a></span>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-color); text-align: center; font-size: 0.9rem; color: var(--text-muted);">
        <h4>Developer Quick Access Credentials:</h4>
        <div style="margin-top: 0.8rem; background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 0.8rem; font-family: monospace; display: flex; flex-direction: column; gap: 0.4rem; text-align: left;">
          <div>🔑 <strong>Admin:</strong> admin@novacart.com / admin123</div>
          <div>🔑 <strong>Customer:</strong> customer@novacart.com / customer123</div>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer style="margin-top: 4rem;">
    <div class="footer-bottom" style="margin-top: 0;">
      <div>&copy; 2026 NovaCart Inc. All Rights Reserved.</div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
